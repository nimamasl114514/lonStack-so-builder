name: 构建preload.so

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Target project name (directory under src/targets/)'
        required: true
        default: 'honor80se'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 安装依赖库
      run: |
        sudo apt-get update
        sudo apt-get install -y make clang lld wget curl binutils

    - name: 拉取源码
      uses: actions/checkout@v4

    - name: 验证target.h存在
      run: |
        if [ ! -f "src/targets/${{ github.event.inputs.project }}/target.h" ]; then
          echo "错误：src/targets/${{ github.event.inputs.project }}/target.h 不存在"
          echo "可用项目："
          ls src/targets/
          exit 1
        fi
        echo "使用项目: ${{ github.event.inputs.project }}"
        head -5 src/targets/${{ github.event.inputs.project }}/target.h

    - name: 设置Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r29

    - name: 构建preload.so
      run: |
        make preload PROJECT=${{ github.event.inputs.project }} API=35 VERBOSE=1

    - name: 上传附件
      uses: actions/upload-artifact@v4
      with:
        name: preload-so-${{ github.event.inputs.project }}
        path: build/*/bin/preload.so
        retention-days: 7